name: Temperature Converter CI/CD

# Trigger on pushes and pull requests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Global environment variables
env:
  PYTHON_VERSION: '3.11'

# Jobs to run
jobs:
  # JOB 1: Test on multiple Python versions
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install coverage
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: 🧪 Run tests with coverage
      run: |
        coverage run -m unittest test_temperature.py -v
        coverage report -m
    
    - name: 📊 Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-python-${{ matrix.python-version }}
        path: .coverage

  # JOB 2: Lint the code
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 Install linters
      run: |
        pip install flake8 pylint
    
    - name: 🔍 Run flake8
      run: |
        flake8 temperature.py test_temperature.py --max-line-length=120 --count --statistics
    
    - name: 🔍 Run pylint
      run: |
        pylint temperature.py --fail-under=8.0 --exit-zero
    
    - name: 📊 Upload lint report
      uses: actions/upload-artifact@v3
      with:
        name: lint-report
        path: |
          *.log
          pylint.txt

  # JOB 3: Build the package
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, lint]  # Only run if tests and lint pass
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 Create package
      run: |
        # Create a distribution package
        mkdir -p dist
        cp temperature.py test_temperature.py dist/
        echo "Temperature Converter v1.0" > dist/VERSION
        tar -czf temperature-converter-${{ github.sha }}.tar.gz -C dist .
        ls -la *.tar.gz
    
    - name: 📤 Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: temperature-converter-package
        path: temperature-converter-*.tar.gz

  # JOB 4: Create a test report
  report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 📥 Download coverage reports
      uses: actions/download-artifact@v3
      with:
        path: reports
    
    - name: 📊 Generate summary
      run: |
        echo "## 📊 Test Results Summary" > report.md
        echo "" >> report.md
        echo "| Python Version | Status |" >> report.md
        echo "|---------------|--------|" >> report.md
        
        # Check which Python versions passed
        for version in 3.8 3.9 3.10 3.11; do
          if [ -d "reports/coverage-report-python-$version" ]; then
            echo "| Python $version | ✅ Passed |" >> report.md
          else
            echo "| Python $version | ❌ Failed |" >> report.md
          fi
        done
        
        echo "" >> report.md
        echo "## ✅ All checks completed!" >> report.md
        echo "Created: $(date)" >> report.md
        
        cat report.md
    
    - name: 📤 Upload test report
      uses: actions/upload-artifact@v3
      with:
        name: test-report
        path: report.md

  # JOB 5: Simulate deployment (only on main branch)
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, report]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Download package
      uses: actions/download-artifact@v3
      with:
        name: temperature-converter-package
    
    - name: 🚀 Simulate deployment
      run: |
        echo "🎯 DEPLOYMENT STARTED"
        echo "📦 Deploying temperature converter..."
        ls -la *.tar.gz
        echo "✅ Deployment successful to staging environment"
        echo "📍 Deployed at: $(date)"
        echo "🔑 Version: ${{ github.sha }}"
    
    - name: 📝 Create deployment log
      run: |
        cat > deployment.log << EOF
        DEPLOYMENT LOG
        ==============
        Time: $(date)
        Commit: ${{ github.sha }}
        Branch: ${{ github.ref_name }}
        Status: SUCCESS
        Package: temperature-converter-${{ github.sha }}.tar.gz
        EOF
        cat deployment.log
    
    - name: 📤 Upload deployment log
      uses: actions/upload-artifact@v3
      with:
        name: deployment-log
        path: deployment.log
